name: CD Release & Mirror

on:
  push:
    branches:
      - dev
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-push-dev:
    name: Build & Push (dev branch)
    runs-on: ubuntu-latest
    if: github.ref_name == 'dev'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Image Names (Lowercase)
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "CLIENT_IMAGE=ghcr.io/$OWNER/trackscendence-client" >> $GITHUB_ENV
          echo "SERVER_IMAGE=ghcr.io/$OWNER/trackscendence-server" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Client Image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          tags: |
            ${{ env.CLIENT_IMAGE }}:dev
            ${{ env.CLIENT_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Server Image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ env.SERVER_IMAGE }}:dev
            ${{ env.SERVER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  mirror-to-main:
    name: Mirror dev to main (main branch promotion)
    runs-on: ubuntu-latest
    if: github.ref_name == 'main'
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Image Names (Lowercase)
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "CLIENT_IMAGE=ghcr.io/$OWNER/trackscendence-client" >> $GITHUB_ENV
          echo "SERVER_IMAGE=ghcr.io/$OWNER/trackscendence-server" >> $GITHUB_ENV

      - name: Pull, Tag, and Push (Mirror)
        run: |
          # Pull dev images
          docker pull ${{ env.CLIENT_IMAGE }}:dev
          docker pull ${{ env.SERVER_IMAGE }}:dev

          # Tag as latest and main
          docker tag ${{ env.CLIENT_IMAGE }}:dev ${{ env.CLIENT_IMAGE }}:main
          docker tag ${{ env.CLIENT_IMAGE }}:dev ${{ env.CLIENT_IMAGE }}:latest
          docker tag ${{ env.SERVER_IMAGE }}:dev ${{ env.SERVER_IMAGE }}:main
          docker tag ${{ env.SERVER_IMAGE }}:dev ${{ env.SERVER_IMAGE }}:latest

          # Push to registry
          docker push ${{ env.CLIENT_IMAGE }}:main
          docker push ${{ env.CLIENT_IMAGE }}:latest
          docker push ${{ env.SERVER_IMAGE }}:main
          docker push ${{ env.SERVER_IMAGE }}:latest
