services:
  database:
    ports:
      - '${DB_PORT}:5432'
  server:
    build: !reset null
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run prisma:generate && npx prisma migrate deploy && npx prisma db seed && exec node --watch index.js"
    environment:
      NODE_ENV: development
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_SECURE: 'false'
      SMTP_FROM: 'Trackscendence <no-reply@trackscendence.local>'
    volumes:
      - ./server:/app
      - server_node_modules:/app/node_modules
      - server_uploads:/app/uploads
    ports:
      - '${SERVER_PORT}:3001'
  client:
    build: !reset null
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    # !override so the dev client does not inherit the production client's TLS
    # env or its 8080/8443 port publishes: dev runs Vite on 5173 only.
    environment: !override
      - VITE_API_PROXY_TARGET=http://server:3001
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
    ports: !override
      - '${CLIENT_DEV_PORT}:5173'

  adminer:
    image: adminer
    ports:
      - '8081:8080'
    depends_on:
      - database

volumes:
  server_node_modules:
  client_node_modules:
  server_uploads:
