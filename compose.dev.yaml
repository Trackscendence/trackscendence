services:
  database:
    ports:
      - "5432:5432"
  server:
    build: !reset null
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npx prisma generate && node --watch index.js"
    environment:
      - NODE_ENV=development
    volumes:
      - ./server:/app
      - server_node_modules:/app/node_modules
  ports:
      - "3001:3001"
  client:
    build: !reset null
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npx vite --host 0.0.0.0"
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
    ports:
      - "${CLIENT_DEV_PORT}:5173"

  adminer:
    image: adminer
    ports:
      - "8081:8080"
    depends_on:
      - database

volumes:
  server_node_modules:
  client_node_modules:
