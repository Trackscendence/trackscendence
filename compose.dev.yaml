services:
  database:
    ports:
      - '${DB_PORT}:5432'
  server:
    build: !reset null
    image: node:22-alpine
    working_dir: /app
    # Install is best-effort and retried: the node_modules volume is already
    # populated after the first boot, so a transient registry ECONNRESET must
    # not abort startup. `;` (not `&&`) after the install chain means we run the
    # server with the existing deps even if every install attempt fails; a
    # genuinely missing dependency still surfaces loudly at prisma/node.
    command: >-
      sh -c "npm install --prefer-offline --no-audit --no-fund
      || (sleep 3 && npm install --prefer-offline --no-audit --no-fund)
      || (sleep 5 && npm install --prefer-offline --no-audit --no-fund)
      || echo 'npm install failed after retries; continuing with existing node_modules';
      npm run prisma:generate
      && (npx prisma migrate deploy
      || (sleep 3 && npx prisma migrate deploy)
      || (sleep 5 && npx prisma migrate deploy))
      && npx prisma db seed
      && exec node --watch index.js"
    environment:
      NODE_ENV: development
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_SECURE: 'false'
      SMTP_FROM: 'Trackscendence <no-reply@trackscendence.local>'
    volumes:
      - ./server:/app
      - server_node_modules:/app/node_modules
      - server_uploads:/app/uploads
    ports:
      - '${SERVER_PORT}:3001'
  client:
    build: !reset null
    image: node:22-alpine
    working_dir: /app
    # Same best-effort, retried install as the server: don't let a transient
    # registry error kill the Vite dev server when node_modules already exists.
    command: >-
      sh -c "npm install --prefer-offline --no-audit --no-fund
      || (sleep 3 && npm install --prefer-offline --no-audit --no-fund)
      || (sleep 5 && npm install --prefer-offline --no-audit --no-fund)
      || echo 'npm install failed after retries; continuing with existing node_modules';
      npm run dev -- --host 0.0.0.0"
    # !override so the dev client does not inherit the production client's TLS
    # env or its 8080/8443 port publishes: dev runs Vite on 5173 only.
    environment: !override
      - VITE_API_PROXY_TARGET=http://server:3001
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
    ports: !override
      - '${CLIENT_DEV_PORT}:5173'

  adminer:
    image: adminer
    ports:
      - '8081:8080'
    depends_on:
      - database

volumes:
  server_node_modules:
  client_node_modules:
  server_uploads:
