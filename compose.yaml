services:
  database:
    image: postgres:17-alpine
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $POSTGRES_USER -d $POSTGRES_DB']
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      - server_uploads:/app/uploads
    environment:
      NODE_ENV: production
      # This local production-style stack runs with NODE_ENV=production, where
      # the app requires a dedicated 2FA secret and will not fall back on its
      # own. Default it to JWT_SECRET here so `compose:up` boots without extra
      # .env setup; real deployments set TWO_FACTOR_ENCRYPTION_SECRET to a
      # separate value.
      TWO_FACTOR_ENCRYPTION_SECRET: '${TWO_FACTOR_ENCRYPTION_SECRET:-${JWT_SECRET}}'
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_SECURE: 'false'
      SMTP_FROM: 'Trackscendence <no-reply@trackscendence.local>'
    depends_on:
      database:
        condition: service_healthy
      mailpit:
        condition: service_started
    # Gate nginx (below) on the server being genuinely ready, mirroring the dev
    # overlay. Without it the client only waits for the container to *start*
    # (service_started), so /api, /uploads, and /websocket/ return 502 during
    # the server's boot — which includes `prisma migrate deploy`. /api/v1/health
    # runs a real `SELECT 1`, so "healthy" means the proxy target can serve.
    # busybox wget ships in node:22-alpine.
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null http://localhost:3001/api/v1/health || exit 1
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 60s

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    # HTTPS for the evaluated stack (#60): TLS terminates here in nginx with a
    # self-signed cert generated at start. Railway keeps ENABLE_TLS unset and
    # serves plain HTTP behind its own TLS edge, so this flag lives in compose
    # only.
    environment:
      ENABLE_TLS: '1'
      CLIENT_HTTPS_PORT: '${CLIENT_HTTPS_PORT:-8443}'
    ports:
      - '${CLIENT_PORT}:8080'
      - '${CLIENT_HTTPS_PORT:-8443}:8443'
    depends_on:
      server:
        condition: service_healthy

  mailpit:
    image: axllent/mailpit
    ports:
      - '${MAILPIT_PORT:-8025}:8025'

volumes:
  pgdata:
  server_uploads:
