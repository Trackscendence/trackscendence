services:
  database:
    image: postgres:17-alpine
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $POSTGRES_USER -d $POSTGRES_DB']
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      - server_uploads:/app/uploads
    environment:
      NODE_ENV: production
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_SECURE: 'false'
      SMTP_FROM: 'Trackscendence <no-reply@trackscendence.local>'
    depends_on:
      database:
        condition: service_healthy
      mailpit:
        condition: service_started

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    # HTTPS for the evaluated stack (#60): TLS terminates here in nginx with a
    # self-signed cert generated at start. Railway keeps ENABLE_TLS unset and
    # serves plain HTTP behind its own TLS edge, so this flag lives in compose
    # only.
    environment:
      ENABLE_TLS: '1'
      CLIENT_HTTPS_PORT: '${CLIENT_HTTPS_PORT:-8443}'
    ports:
      - '${CLIENT_PORT}:8080'
      - '${CLIENT_HTTPS_PORT:-8443}:8443'
    depends_on:
      - server

  mailpit:
    image: axllent/mailpit
    ports:
      - '${MAILPIT_PORT:-8025}:8025'

volumes:
  pgdata:
  server_uploads:
