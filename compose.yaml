services:
  database:
    image: postgres:17-alpine
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $POSTGRES_USER -d $POSTGRES_DB']
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      - server_uploads:/app/uploads
    environment:
      NODE_ENV: production
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_SECURE: 'false'
      SMTP_FROM: 'Trackscendence <no-reply@trackscendence.local>'
    depends_on:
      database:
        condition: service_healthy
      mailpit:
        condition: service_started

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - '${CLIENT_PORT}:8080'
    depends_on:
      - server

  mailpit:
    image: axllent/mailpit
    ports:
      - '8025:8025'

volumes:
  pgdata:
  server_uploads:
